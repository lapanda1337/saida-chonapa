<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравления для Саиды Чонапашки</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e; 
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #ff758c;
            box-shadow: 0 0 25px rgba(255, 117, 140, 0.3);
            max-width: 420px;
            width: 85%;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #ff758c;
            font-size: 26px;
            margin-bottom: 10px;
        }

        .intro {
            font-size: 18px;
            color: #d1d1e9;
            margin-bottom: 20px;
        }

        .btn {
            background: #ff758c;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 17px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        /* Блок, который появится после нажатия */
        #secret-content {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            animation: slideIn 0.6s ease-out;
        }

        .main-wish {
            font-size: 20px; /* Нормальный размер, не слишком большой */
            line-height: 1.5;
            color: #ffd700; /* Золотой акцент */
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji {
            position: fixed;
            top: -50px;
            font-size: 24px;
            z-index: 100;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>С днём рождения! 🎂</h1>
        <p class="intro">Дорогая Саида Чонапа, у меня для Вас есть кое-что особенное...</p>
        
        <button class="btn" id="giftBtn" onclick="reveal()">Нажми для сюрприза 🎁</button>
        
        <div id="secret-content">
            <p class="main-wish">
                <strong>Саида Чонапашка!</strong><br><br>
                Я Вас поздравляю от всей души! Вы очень добрая, я искренне желаю Вам огромного счастья, здоровья и много улыбок! ✨❤️🌹
            </p>
        </div>
    </div>

    <script>
        function reveal() {
            // Показываем текст
            document.getElementById('secret-content').style.display = 'block';
            // Прячем кнопку
            document.getElementById('giftBtn').style.display = 'none';

            // Запускаем смайлики
            const emojis = ['🌹', '✨', '💖', '🎉', '🎈', '🌸', '🎂'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'emoji';
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 5000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
